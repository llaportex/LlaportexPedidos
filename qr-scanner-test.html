<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test QR v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;padding:16px;background:#f5f5f5}
h2{margin-bottom:12px;font-size:18px}
button{width:100%;padding:14px;font-size:16px;font-weight:bold;background:#1a56db;color:#fff;border:none;border-radius:8px;margin-bottom:10px;cursor:pointer}
button:active{background:#1e40af}
video{width:100%;background:#000;border-radius:8px;display:block;margin-bottom:10px;min-height:200px}
#log{background:#111;color:#0f0;padding:12px;border-radius:8px;font-family:monospace;font-size:12px;min-height:150px;white-space:pre-wrap;word-break:break-all}
#det{background:#ecfdf5;color:#065f46;padding:12px;border-radius:8px;font-size:20px;font-weight:bold;text-align:center;margin-bottom:10px;display:none}
</style>
</head>
<body>
<h2>🔍 Test QR Scanner v2</h2>
<div id="det">✅ QR: <span id="qrval"></span></div>
<button onclick="iniciar()">📷 INICIAR CÁMARA</button>
<video id="v" playsinline muted autoplay></video>
<div id="log">Esperando...</div>

<script>
var st=null, active=false, sc=null, sctx=null;

function log(msg){
  var el=document.getElementById('log');
  var t=new Date().toTimeString().substr(0,8);
  el.textContent += t+' '+msg+'
';
  el.scrollTop=el.scrollHeight;
  console.log(msg);
}

function iniciar(){
  log('Botón pulsado');
  
  if(st){
    // Parar
    active=false;
    st.getTracks().forEach(function(t){t.stop()});
    st=null;
    document.getElementById('v').srcObject=null;
    log('Cámara parada');
    return;
  }
  
  // Verificar soporte
  if(!navigator.mediaDevices){
    log('ERROR: navigator.mediaDevices no disponible');
    log('HTTPS: '+location.protocol);
    return;
  }
  if(!navigator.mediaDevices.getUserMedia){
    log('ERROR: getUserMedia no disponible');
    return;
  }
  if(typeof jsQR === 'undefined'){
    log('ERROR: jsQR no cargado');
    return;
  }
  
  log('jsQR OK, getUserMedia OK');
  log('Protocolo: '+location.protocol);
  log('Host: '+location.host);
  
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'}},
    audio:false
  }).then(function(stream){
    st=stream;
    var v=document.getElementById('v');
    var track=stream.getVideoTracks()[0];
    var info=track.getSettings();
    log('Stream OK: '+info.width+'x'+info.height);
    log('facingMode: '+(info.facingMode||'desconocido'));
    v.srcObject=stream;
    v.onloadedmetadata=function(){
      log('Video listo: '+v.videoWidth+'x'+v.videoHeight);
      v.play().then(function(){
        log('Play OK - iniciando scan');
        active=true;
        requestAnimationFrame(scan);
      }).catch(function(e){
        log('Play ERROR: '+e.message);
        active=true;
        requestAnimationFrame(scan);
      });
    };
    setTimeout(function(){
      if(active)return;
      log('Timeout fallback: readyState='+v.readyState+' w='+v.videoWidth);
      active=true;
      requestAnimationFrame(scan);
    },1500);
  }).catch(function(e){
    log('getUserMedia ERROR: '+e.name);
    log('Mensaje: '+e.message);
  });
}

var frames=0;
function scan(){
  if(!active||!st)return;
  var v=document.getElementById('v');
  frames++;
  var W=v.videoWidth, H=v.videoHeight;
  if(frames%60===0){
    log('Frame '+frames+': '+W+'x'+H+' paused='+v.paused);
  }
  if(!W||!H){requestAnimationFrame(scan);return}
  if(!sc||sc.width!==W){
    sc=document.createElement('canvas');
    sc.width=W;sc.height=H;
    sctx=sc.getContext('2d');
    log('Canvas: '+W+'x'+H);
  }
  sctx.drawImage(v,0,0,W,H);
  var img=sctx.getImageData(0,0,W,H);
  var code=jsQR(img.data,img.width,img.height,{inversionAttempts:'attemptBoth'});
  if(code&&code.data){
    log('QR DETECTADO: '+code.data);
    active=false;
    document.getElementById('qrval').textContent=code.data;
    document.getElementById('det').style.display='block';
    return;
  }
  requestAnimationFrame(scan);
}
</script>
</body>
</html>
